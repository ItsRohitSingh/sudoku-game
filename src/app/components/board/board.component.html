<div class="board glass-panel" *ngIf="gameState$ | async as state">
    <div class="grid">
        <app-cell *ngFor="let cell of state.board" [cell]="cell" (selectCell)="onSelectCell($event)"
            [class.border-right]="(cell.col + 1) % 3 === 0 && cell.col !== 8"
            [class.border-bottom]="(cell.row + 1) % 3 === 0 && cell.row !== 8">
        </app-cell>
    </div>
</div>
